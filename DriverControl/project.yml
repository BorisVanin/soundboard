name: DriverControl
options:
  bundleIdPrefix: ca.borisvanin
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    GENERATE_INFOPLIST_FILE: YES
    SUPPORTED_PLATFORMS: "macosx"
    # Project-level signing + Xcode "Validate Project Settings" recommendations,
    # inherited by every target (so no per-target DEVELOPMENT_TEAM).
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++17"

targets:
  DriverControl:
    type: framework
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_IDENTIFIER}.drivercontrol
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Embedded in Soundboard.app: the app's "Embed Frameworks" phase
        # re-signs this with the app's identity (Code Sign On Copy), so we
        # don't sign it at build time — matching Xcode's "Disable Code Signing"
        # recommendation for embedded frameworks.
        CODE_SIGN_STYLE: Manual
        CODE_SIGN_IDENTITY: ""
        PROVISIONING_PROFILE_SPECIFIER: ""
        DEFINES_MODULE: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
