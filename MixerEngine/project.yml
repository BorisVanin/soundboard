name: MixerEngine

# Composable target templates, vendored at ./xcodegen-templates (mise run templates).
# ${TEMPLATES_HOME} / ${PROJECT_HOME} expand at generate time (exported by .envrc).
include:
  - ${TEMPLATES_HOME}/Base.yml
  - ${TEMPLATES_HOME}/CodeSignAuto.yml
  - ${TEMPLATES_HOME}/CodeSignDevID.yml
  - ${TEMPLATES_HOME}/SwiftLint.yml
  - ${TEMPLATES_HOME}/BuildNumber.yml

options:
  bundleIdPrefix: ca.borisvanin
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

settings:
  base:
    # Shared compiler/platform settings — kept local (not covered by any template).
    SWIFT_VERSION: "5.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SUPPORTED_PLATFORMS: "macosx"
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++17"

targets:
  MixerEngine:
    type: framework
    platform: macOS
    templates:
      - Base
      - CodeSignDevID
      - SwiftLint
      - BuildNumber
    sources:
      - src
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: ${PROJECT_IDENTIFIER}.engine
        DEFINES_MODULE: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule
