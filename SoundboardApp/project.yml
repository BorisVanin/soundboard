name: SoundboardApp

# Composable target templates, vendored at ./xcodegen-templates (mise run templates).
# ${TEMPLATES_HOME} / ${PROJECT_HOME} expand at generate time (exported by .envrc).
include:
  - ${TEMPLATES_HOME}/Base.yml
  - ${TEMPLATES_HOME}/CodeSignAuto.yml
  - ${TEMPLATES_HOME}/CodeSignDevID.yml
  - ${TEMPLATES_HOME}/SwiftLint.yml
  - ${TEMPLATES_HOME}/BuildNumber.yml

options:
  bundleIdPrefix: ca.borisvanin
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

settings:
  base:
    # Shared compiler/platform settings — kept local (not covered by any template).
    SWIFT_VERSION: "5.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SUPPORTED_PLATFORMS: "macosx"
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++17"

projectReferences:
  MixerModel:
    path: ../MixerModel/MixerModel.xcodeproj
  MixerEngine:
    path: ../MixerEngine/MixerEngine.xcodeproj
  MIDISurface:
    path: ../MIDISurface/MIDISurface.xcodeproj
  DriverControl:
    path: ../DriverControl/DriverControl.xcodeproj
  # The HAL driver is built and embedded inside the app bundle so a single
  # Developer ID export signs it too; the .pkg postinstall then lays it into
  # /Library/Audio/Plug-Ins/HAL on the target Mac (see pkg-scripts/postinstall).
  LoopbackDriver:
    path: ../LoopbackDriver/LoopbackDriver.xcodeproj

targets:
  SoundboardApp:
    type: application
    platform: macOS
    templates:
      - Base
      - CodeSignDevID
      - SwiftLint
      - BuildNumberAutoIncrement
    sources:
      - src
      - Resources
    entitlements:
      path: SoundboardApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    dependencies:
      - target: MixerModel/MixerModel
        embed: true
      - target: MixerEngine/MixerEngine
        embed: true
      - target: MIDISurface/MIDISurface
        embed: true
      - target: DriverControl/DriverControl
        embed: true
      # Build the HAL AudioServerPlugIn before the app, but don't link or embed it
      # via XcodeGen: a cross-project `.driver` (a CFPlugIn bundle) gets mis-handled
      # as a `.bundle` resource. The postBuildScript below copies the real product
      # into the wrapper instead. coreaudiod loads it out-of-process, so no linking.
      - target: LoopbackDriver/SoundboardDriver
        link: false
        embed: false
    # Nest the freshly-built driver inside the app at the conventional HAL path.
    # Runs after the embed phases and before the app's implicit code-sign, so the
    # app's signature seals it (and the Developer ID export re-signs it with a
    # secure timestamp, like the embedded frameworks). The .pkg postinstall then
    # lifts it out to /Library/Audio/Plug-Ins/HAL on the target Mac.
    postBuildScripts:
      - name: Embed HAL driver
        basedOnDependencyAnalysis: false
        script: |
          set -euo pipefail
          DRIVER="SoundboardDriver.driver"
          SRC="${BUILT_PRODUCTS_DIR}/${DRIVER}"
          DST="${TARGET_BUILD_DIR}/${WRAPPER_NAME}/Contents/Library/Audio/Plug-Ins/HAL"
          [ -d "$SRC" ] || { echo "driver not built: $SRC" >&2; exit 1; }
          # In ARCHIVE builds, BUILT_PRODUCTS_DIR/<product> is a SYMLINK into the
          # intermediate UninstalledProducts dir; resolve it to the real bundle so
          # we copy contents (a copied symlink dangles after export → codesign
          # "No such file or directory"). ditto preserves the bundle + signature.
          REAL="$(cd "$SRC" && pwd -P)"
          mkdir -p "$DST"
          rm -rf "${DST:?}/${DRIVER}"
          /usr/bin/ditto "$REAL" "$DST/${DRIVER}"
    settings:
      base:
        # Base enables the user script sandbox (ENABLE_USER_SCRIPT_SANDBOXING),
        # which denies file-writes outside declared I/O. The "Embed HAL driver"
        # script above legitimately writes into this app's own bundle wrapper, so
        # turn the sandbox off for this target only.
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # The product is "Soundboard" even though the target/scheme is
        # "SoundboardApp": this names the bundle Soundboard.app and sets
        # CFBundleName/executable to Soundboard (what Finder, the installer, and
        # System Settings ▸ Accessibility display).
        PRODUCT_NAME: Soundboard
        PRODUCT_BUNDLE_IDENTIFIER: ${PROJECT_IDENTIFIER}.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        # Info.plist is generated (BuildNumberAutoIncrement's GENERATE_INFOPLIST_FILE: YES):
        # the version keys come from BuildNumber, the rest from these INFOPLIST_KEY_* settings.
        INFOPLIST_KEY_CFBundleDisplayName: "Soundboard"
        INFOPLIST_KEY_NSMicrophoneUsageDescription: "Soundboard captures audio from your apps and microphone to mix them."
        # Required for the system-audio process tap (kTCCServiceAudioCapture) — distinct
        # from the microphone grant; without it macOS silently feeds the tap silence.
        INFOPLIST_KEY_NSAudioCaptureUsageDescription: "Soundboard captures your Mac's system audio to mix it with your microphone."
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          SWIFT_COMPILATION_MODE: wholemodule

# A shared scheme so `xcodebuild -scheme Soundboard` works from the CLI (and
# survives `make gen`, which regenerates the project each time). Named after the
# product (Soundboard.app), not the target, so the templates' distribution scripts
# name artifacts Soundboard-<version>.pkg/.dmg (they use ${APP_SCHEME}).
schemes:
  Soundboard:
    build:
      targets:
        SoundboardApp: all
    run:
      config: Debug
    archive:
      config: Release
