name: SoundboardApp
options:
  bundleIdPrefix: ca.borisvanin
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.0"
    SWIFT_APPROACHABLE_CONCURRENCY: YES
    SWIFT_DEFAULT_ACTOR_ISOLATION: MainActor
    SUPPORTED_PLATFORMS: "macosx"
    # Project-level signing + Xcode "Validate Project Settings" recommendations,
    # inherited by every target (so no per-target DEVELOPMENT_TEAM).
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++17"

projectReferences:
  MixerModel:
    path: ../MixerModel/MixerModel.xcodeproj
  MixerEngine:
    path: ../MixerEngine/MixerEngine.xcodeproj
  MIDISurface:
    path: ../MIDISurface/MIDISurface.xcodeproj
  DriverControl:
    path: ../DriverControl/DriverControl.xcodeproj

targets:
  SoundboardApp:
    type: application
    platform: macOS
    sources:
      - Sources
      - Resources
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: "Soundboard"
        NSMicrophoneUsageDescription: "Soundboard captures audio from your apps and microphone to mix them."
        # Required for the system-audio process tap (kTCCServiceAudioCapture) — distinct
        # from the microphone grant; without it macOS silently feeds the tap silence.
        NSAudioCaptureUsageDescription: "Soundboard captures your Mac's system audio to mix it with your microphone."
    entitlements:
      path: SoundboardApp.entitlements
      properties:
        com.apple.security.app-sandbox: false
        com.apple.security.device.audio-input: true
    dependencies:
      - target: MixerModel/MixerModel
        embed: true
      - target: MixerEngine/MixerEngine
        embed: true
      - target: MIDISurface/MIDISurface
        embed: true
      - target: DriverControl/DriverControl
        embed: true
    settings:
      base:
        # The product is "Soundboard" even though the target/scheme is
        # "SoundboardApp": this names the bundle Soundboard.app and sets
        # CFBundleName/executable to Soundboard (what Finder, the installer, and
        # System Settings ▸ Accessibility display).
        PRODUCT_NAME: Soundboard
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_IDENTIFIER}.app
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Manual signing: Debug = Apple Development, Release = Developer ID
        # Application (per-config CODE_SIGN_IDENTITY below). Xcode signs the app
        # + its embedded frameworks at build time; installer/build-pkg.sh only
        # signs the .pkg itself with Developer ID Installer.
        CODE_SIGN_STYLE: Manual
        PROVISIONING_PROFILE_SPECIFIER: ""
        ENABLE_PREVIEWS: YES
        ENABLE_HARDENED_RUNTIME: YES
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: "DEBUG $(inherited)"
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          SWIFT_COMPILATION_MODE: wholemodule

# A shared scheme so `xcodebuild -workspace … -scheme SoundboardApp` works from the
# CLI (and survives `make generate`, which regenerates the project each time).
schemes:
  SoundboardApp:
    build:
      targets:
        SoundboardApp: all
    run:
      config: Debug
    archive:
      config: Release
