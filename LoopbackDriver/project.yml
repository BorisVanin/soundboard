name: LoopbackDriver
options:
  bundleIdPrefix: ca.borisvanin
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

settings:
  base:
    SUPPORTED_PLATFORMS: "macosx"
    GENERATE_INFOPLIST_FILE: NO
    # Project-level signing + Xcode "Validate Project Settings" recommendations,
    # inherited by every target (so no per-target DEVELOPMENT_TEAM).
    DEVELOPMENT_TEAM: ${DEVELOPMENT_TEAM}
    DEAD_CODE_STRIPPING: YES
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++17"

targets:
  # An AudioServerPlugIn is a CFPlugIn bundle with the `.driver` extension,
  # installed into /Library/Audio/Plug-Ins/HAL/ and loaded by coreaudiod.
  SoundboardDriver:
    type: bundle
    platform: macOS
    sources:
      - Sources
    settings:
      base:
        PRODUCT_NAME: SoundboardDriver
        PRODUCT_BUNDLE_IDENTIFIER: ${BUNDLE_IDENTIFIER}.loopbackdriver
        WRAPPER_EXTENSION: driver
        INFOPLIST_FILE: Info.plist
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        # Installed standalone into /Library/Audio/Plug-Ins/HAL (not embedded in
        # the app), so Xcode signs it itself: Debug = Apple Development, Release =
        # Developer ID Application (per-config below). Hardened runtime is
        # required for notarization (the build script previously forced it via
        # --options runtime).
        CODE_SIGN_STYLE: Manual
        ENABLE_HARDENED_RUNTIME: YES
        PROVISIONING_PROFILE_SPECIFIER: ""
        # coreaudiod loads the bundle out-of-process; keep it a plain bundle.
        MACH_O_TYPE: mh_bundle
        GCC_C_LANGUAGE_STANDARD: gnu11
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_CXX_LIBRARY: "libc++"
        CLANG_ENABLE_OBJC_ARC: NO
      configs:
        Debug:
          CODE_SIGN_IDENTITY: "Apple Development"
          GCC_OPTIMIZATION_LEVEL: "0"
        Release:
          CODE_SIGN_IDENTITY: "Developer ID Application"
          GCC_OPTIMIZATION_LEVEL: "s"
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: CoreFoundation.framework
