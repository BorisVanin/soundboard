name: LoopbackDriver

# Composable target templates, vendored at ./xcodegen-templates (mise run templates).
# ${TEMPLATES_HOME} / ${PROJECT_HOME} expand at generate time (exported by .envrc).
include:
  - ${TEMPLATES_HOME}/Base.yml
  - ${TEMPLATES_HOME}/CodeSignAuto.yml
  - ${TEMPLATES_HOME}/CodeSignDevID.yml
  - ${TEMPLATES_HOME}/SwiftLint.yml
  - ${TEMPLATES_HOME}/BuildNumber.yml

options:
  bundleIdPrefix: ca.borisvanin
  deploymentTarget:
    macOS: "14.2"
  xcodeVersion: "16.2"
  generateEmptyDirectories: true

settings:
  base:
    # Shared platform settings — kept local (not covered by any template).
    SUPPORTED_PLATFORMS: "macosx"
    ENABLE_MODULE_VERIFIER: YES
    MODULE_VERIFIER_SUPPORTED_LANGUAGES: "objective-c objective-c++"
    MODULE_VERIFIER_SUPPORTED_LANGUAGE_STANDARDS: "gnu11 gnu++17"

targets:
  # An AudioServerPlugIn is a CFPlugIn bundle with the `.driver` extension,
  # installed into /Library/Audio/Plug-Ins/HAL/ and loaded by coreaudiod.
  # No SwiftLint: this target is C/C++/Obj-C++ (no Swift sources).
  SoundboardDriver:
    type: bundle
    platform: macOS
    templates:
      - Base
      - CodeSignDevID
      - BuildNumber
    sources:
      - src
    settings:
      base:
        PRODUCT_NAME: SoundboardDriver
        PRODUCT_BUNDLE_IDENTIFIER: ${PROJECT_IDENTIFIER}.loopbackdriver
        WRAPPER_EXTENSION: driver
        # Partial Info.plist: holds the CFPlugInFactories/CFPlugInTypes the HAL needs
        # (can't be expressed as INFOPLIST_KEY_*). BuildNumber's GENERATE_INFOPLIST_FILE: YES
        # merges the generated keys (version, identifier, …) on top of it.
        INFOPLIST_FILE: Info.plist
        # Hardened runtime is required for notarization (not part of CodeSignDevID).
        ENABLE_HARDENED_RUNTIME: YES
        PROVISIONING_PROFILE_SPECIFIER: ""
        # coreaudiod loads the bundle out-of-process; keep it a plain bundle.
        MACH_O_TYPE: mh_bundle
        GCC_C_LANGUAGE_STANDARD: gnu11
        CLANG_CXX_LANGUAGE_STANDARD: "gnu++17"
        CLANG_CXX_LIBRARY: "libc++"
        CLANG_ENABLE_OBJC_ARC: NO
      configs:
        Debug:
          GCC_OPTIMIZATION_LEVEL: "0"
        Release:
          GCC_OPTIMIZATION_LEVEL: "s"
    dependencies:
      - sdk: CoreAudio.framework
      - sdk: CoreFoundation.framework
